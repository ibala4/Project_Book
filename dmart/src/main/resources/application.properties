# Server
server.port=8080

# PostgreSQL Database
# Reads from environment variables if set, otherwise falls back to the
# defaults after the colon — no real password lives in this file.
spring.datasource.url=jdbc:postgresql://localhost:5432/dmartdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=Bala@1994

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Static resources (login.html, index.html) must never be cached by the
# browser, since login state can change between requests. Set explicitly
# from the start this time, so refresh/logout always reflect the real
# server state instead of a stale cached page.
spring.web.resources.cache.period=0
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.no-store=true
spring.web.resources.cache.cachecontrol.must-revalidate=true
