# Server
server.port=8080

# PostgreSQL Database
# Reads from environment variables if set, otherwise falls back to the
# defaults after the colon. This way no real password ever lives in this
# file, so it's safe to commit to GitHub.
spring.datasource.url=jdbc:postgresql://localhost:5432/librarydb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=Bala@1994

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Static resources (login.html, index.html, register.html) must never be
# cached by the browser — login state can change between requests, and a
# cached page would show stale content after logout. period=0 plus
# no-cache=true together force a hard "always revalidate with the server"
# Cache-Control header on every static file response.
spring.web.resources.cache.period=0
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.no-store=true
spring.web.resources.cache.cachecontrol.must-revalidate=true
